<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The EndoSex Working Space</title>
<style>
  :root{
    --bg:#f4efe4; --surface:#fffdf7; --surface-2:#efe8d8; --border:#e3d9c4;
    --text:#33302a; --text-soft:#877d67; --accent:#4f7d70; --accent-2:#c47a52;
    --accent-soft:#e4ede9;
    --ok:#4f8a5b; --ok-soft:#dcecdd; --warn:#bd8324; --warn-soft:#f4e8cf;
    --danger:#b25548; --danger-soft:#f2ddd7;
    --dot:rgba(120,108,80,.16);
    --shadow:0 1px 2px rgba(80,66,40,.10),0 4px 14px rgba(80,66,40,.05);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,ui-serif,serif;
    --radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#191a1d; --surface:#232529; --surface-2:#2d2f34; --border:#3a3d43;
    --text:#e9eaed; --text-soft:#a2a6ad; --accent:#7fbcae; --accent-2:#e3a276;
    --accent-soft:#233230;
    --ok:#7cc39a; --ok-soft:#213029; --warn:#e2c069; --warn-soft:#33301f;
    --danger:#ea8a82; --danger-soft:#382725;
    --dot:rgba(225,230,240,.05);
    --shadow:0 1px 2px rgba(0,0,0,.45),0 8px 22px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;
    background-color:var(--bg);
    background-image:radial-gradient(var(--dot) 1.3px, transparent 1.3px);
    background-size:22px 22px; background-position:-11px -11px;}
  h1,h2,h3,h4{font-family:var(--serif);font-weight:600;letter-spacing:.1px}
  button{font:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface);
    color:var(--text);border-radius:9px;padding:.5rem .85rem;transition:.15s;box-shadow:var(--shadow)}
  button:hover{background:var(--surface-2)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover{filter:brightness(1.06)}
  button.ghost{border-color:transparent;background:transparent;box-shadow:none}
  button.tiny{padding:.28rem .55rem;font-size:.8rem;box-shadow:none}
  input,textarea,select{font:inherit;color:var(--text);background:var(--surface);
    border:1px solid var(--border);border-radius:9px;padding:.55rem .7rem;width:100%}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft)}
  textarea{resize:vertical;min-height:70px}
  a{color:var(--accent)}
  .hidden{display:none!important}
  .muted{color:var(--text-soft)}
  .small{font-size:.82rem}
  .row{display:flex;gap:.5rem;align-items:center}
  .wrap{flex-wrap:wrap}
  .grow{flex:1}
  .stack{display:flex;flex-direction:column;gap:.6rem}
  .badge{display:inline-block;min-width:18px;text-align:center;background:var(--accent-2);
    color:#fff;border-radius:999px;padding:0 6px;font-size:.72rem;font-weight:700}
  .pill{display:inline-block;padding:.12rem .55rem;border-radius:999px;font-size:.72rem;font-weight:600;
    background:var(--surface-2);color:var(--text-soft);border:1px solid transparent}
  .pill.todo{background:var(--warn-soft);color:var(--warn)}
  .pill.in_progress{background:var(--accent-soft);color:var(--accent)}
  .pill.done{background:var(--ok-soft);color:var(--ok)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:1rem;box-shadow:var(--shadow)}

  /* Top bar */
  header{position:sticky;top:0;z-index:20;background:var(--surface);
    border-bottom:1px solid var(--border);box-shadow:0 2px 0 var(--accent-soft);
    padding:.55rem .9rem;display:flex;gap:.55rem;align-items:center;
    padding-top:calc(.55rem + env(safe-area-inset-top))}
  header h1{font-size:1.05rem;margin:0;white-space:nowrap}
  header .logo{width:30px;height:30px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:.8rem;flex:none;
    font-family:var(--serif);box-shadow:var(--shadow)}
  .iconbtn{border:1px solid var(--border);background:var(--surface);border-radius:9px;
    width:38px;height:38px;display:grid;place-items:center;padding:0;font-size:1rem;position:relative}
  .iconbtn .badge{position:absolute;top:-6px;right:-6px}
  /* Logo "EndoSexhub" */
  .brandlogo{display:inline-flex;align-items:center;background:#000;border-radius:9px;
    padding:.24rem .5rem;font-family:Arial,Helvetica,sans-serif;font-weight:800;
    font-size:1.18rem;line-height:1;letter-spacing:-.5px;box-shadow:var(--shadow);flex:none}
  .brandlogo .w{color:#fff}
  .brandlogo .o{color:#000;background:#ff9000;border-radius:5px;padding:0 .26rem;margin-left:.14rem}
  .brandlogo.big{font-size:2.4rem;padding:.45rem .9rem;border-radius:14px}
  .hdr-side{flex:1;display:flex;align-items:center;gap:.45rem}
  .hdr-side.right{justify-content:flex-end;flex-wrap:wrap}
  .hdr-center{flex:0 0 auto;display:flex;justify-content:center}
  @media(max-width:760px){
    .brandlogo{font-size:1.3rem} .brandlogo.big{font-size:1.8rem}
    header{flex-direction:column;gap:.45rem}
    .hdr-side.left{display:none}
    .hdr-center{width:100%;justify-content:center}
    .hdr-side.right{flex:none;width:100%;justify-content:center;flex-wrap:wrap;gap:.5rem}
  }

  /* Layout */
  main{max-width:1100px;margin:0 auto;padding:1.1rem .9rem 4rem}
  nav.tabs{display:flex;gap:.45rem;margin-bottom:1.1rem;flex-wrap:wrap}
  nav.tabs button{border-radius:999px}
  nav.tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .split{display:grid;grid-template-columns:300px 1fr;gap:1rem;align-items:start}
  @media(max-width:760px){ .split{grid-template-columns:1fr} header h1{font-size:.92rem} }

  .listitem{width:100%;text-align:left;display:flex;flex-direction:column;gap:.15rem;align-items:flex-start;
    border-left:4px solid var(--accent-2)}
  .listitem.active{background:var(--accent-soft);border-color:var(--accent);border-left-color:var(--accent)}
  .task{border:1px solid var(--border);border-left:5px solid var(--border);border-radius:11px;
    padding:.8rem;background:var(--surface);margin-bottom:.6rem;box-shadow:var(--shadow)}
  .task.s-todo{border-left-color:var(--warn)}
  .task.s-in_progress{border-left-color:var(--accent)}
  .task.s-done{border-left-color:var(--ok);opacity:.72}
  .task h4{margin:0 0 .2rem;font-size:1.02rem}
  .avatar{width:24px;height:24px;border-radius:50%;background:var(--accent-soft);color:var(--accent);
    display:inline-grid;place-items:center;font-size:.7rem;font-weight:700;border:1px solid var(--border)}

  /* Auth */
  .auth-wrap{min-height:82vh;display:grid;place-items:center;padding:1rem}
  .auth-card{width:100%;max-width:370px}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(40,32,18,.5);display:grid;place-items:center;z-index:50;padding:1rem}
  .modal{width:100%;max-width:470px;max-height:90vh;overflow:auto}
  .toast{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);z-index:60;
    background:var(--text);color:var(--bg);padding:.6rem 1rem;border-radius:10px;box-shadow:var(--shadow);
    max-width:90vw}
  label.field{display:block;margin-bottom:.15rem;font-size:.82rem;color:var(--text-soft)}
</style>
</head>
<body>

<!-- ==================== TOP BAR ==================== -->
<header id="topbar" class="hidden">
  <div class="hdr-side left"></div>
  <div class="hdr-center"><span class="brandlogo"><span class="w">EndoSex</span><span class="o">hub</span></span></div>
  <div class="hdr-side right">
    <button class="iconbtn hidden" id="btnAttAdmin" title="Allegati (admin)">🗂️</button>
    <button class="iconbtn hidden" id="btnNewUser" title="Nuovo account">+👤</button>
    <button class="iconbtn" id="btnLang" title="Language">IT</button>
    <button class="iconbtn" id="btnTheme" title="Theme">🌙</button>
    <button class="iconbtn" id="btnNotif" title="Notifiche">🔔<span class="badge hidden" id="notifCount">0</span></button>
    <button class="iconbtn" id="btnLogout" title="Logout">⎋</button>
  </div>
</header>

<!-- ==================== AUTH ==================== -->
<div id="authView" class="auth-wrap">
  <div class="card auth-card stack">
    <div class="row" style="justify-content:center;margin-top:.4rem"><span class="brandlogo big"><span class="w">EndoSex</span><span class="o">hub</span></span></div>
    <h1 style="margin:.4rem 0 0;font-size:1.1rem;text-align:center">The EndoSex Working Space</h1>
    <p class="muted small" id="authTagline"></p>
    <div>
      <label class="field" id="lblEmail">Email</label>
      <input id="email" type="email" autocomplete="username" />
    </div>
    <div>
      <label class="field" id="lblPassword">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
    </div>
    <button class="primary" id="btnLogin">Login</button>
    <p class="small danger hidden" id="authError" style="color:var(--danger)"></p>
    <div class="row" style="justify-content:space-between">
      <button class="ghost tiny" id="authLang">EN</button>
      <button class="ghost tiny" id="authTheme">🌙</button>
    </div>
  </div>
</div>

<!-- ==================== APP ==================== -->
<main id="appView" class="hidden">
  <nav class="tabs">
    <button data-tab="lists" class="active" id="tabLists"></button>
    <button data-tab="notes" id="tabNotes"></button>
    <button data-tab="tools" id="tabTools"></button>
    <button data-tab="archived" id="tabArchived"></button>
    <button data-tab="guide" id="tabGuide"></button>
  </nav>

  <!-- TAB: LISTS -->
  <section id="panel-lists">
    <div class="split">
      <div class="stack">
        <button class="primary" id="btnNewList"></button>
        <div class="stack" id="listsContainer"></div>
      </div>
      <div id="listDetail" class="stack"></div>
    </div>
  </section>

  <!-- TAB: NOTES -->
  <section id="panel-notes" class="hidden stack">
    <div class="card stack">
      <input id="noteTitle" />
      <textarea id="noteContent"></textarea>
      <div class="row"><button class="primary" id="btnAddNote"></button></div>
    </div>
    <div class="stack" id="notesContainer"></div>
  </section>

  <!-- TAB: TOOLS -->
  <section id="panel-tools" class="hidden stack">
    <div class="card stack">
      <div class="row wrap">
        <input id="toolName" style="flex:1 1 180px" />
        <input id="toolUrl" style="flex:2 1 240px" />
      </div>
      <input id="toolDesc" />
      <div class="row"><button class="primary" id="btnAddTool"></button></div>
    </div>
    <div class="stack" id="toolsContainer"></div>
  </section>

  <!-- TAB: ARCHIVED -->
  <section id="panel-archived" class="hidden stack"></section>

  <!-- TAB: GUIDE -->
  <section id="panel-guide" class="hidden stack"></section>
</main>

<div id="modalHost"></div>
<div id="toastHost"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

// ============================================================================
//  Contenuto della "Guida facile" (stile spiegamelo-come-a-un-bambino)
// ============================================================================
const GUIDE = {
  it:`
  <div class="card stack">
    <h2 style="margin:0">🧭 Guida facile</h2>
    <p class="muted" style="margin:0">Tutto quello che serve, spiegato in parole semplici. Niente paura: qui non si rompe nulla.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Cos'è questo posto?</h3>
    <p style="margin:0">Immagina una <strong>lavagna condivisa</strong> del gruppo. Qui segniamo <strong>chi deve fare cosa</strong>, ci lasciamo <strong>appunti</strong> e teniamo in ordine i <strong>link agli strumenti</strong> che usiamo. Ognuno vede solo le cose che lo riguardano.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Le tre parole da capire</h3>
    <p style="margin:0"><strong>Elenco</strong> = una cartellina per un progetto (es. <em>"Paper XYZ"</em>). Dentro ci stanno i task di quel progetto.</p>
    <p style="margin:0"><strong>Task</strong> = una cosa da fare (es. <em>"scrivere l'introduzione"</em>). Ha chi lo fa e uno stato.</p>
    <p style="margin:0"><strong>Persone dell'elenco</strong> = i <strong>Partecipanti</strong> (fanno il lavoro) e gli <strong>Spettatori</strong> (guardano soltanto, non toccano).</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Come faccio a…</h3>
    <p style="margin:0"><strong>Creare una cartellina di lavoro:</strong> vai su <em>Elenchi &amp; Task</em> → <em>+ Nuovo elenco</em>, dai un nome e conferma.</p>
    <p style="margin:0"><strong>Invitare colleghi:</strong> apri l'elenco → <em>Gestisci persone</em> → scegli la persona e premi <em>Aggiungi partecipante</em> (o <em>Aggiungi spettatore</em>).</p>
    <p style="margin:0"><strong>Assegnare un compito:</strong> apri l'elenco → <em>+ Nuovo task</em>, scrivi cosa serve e scegli a chi assegnarlo. Quella persona riceverà una notifica (campanella 🔔 in alto) e una mail.</p>
    <p style="margin:0"><strong>Dire "l'ho fatto":</strong> sul task premi <em>Segna completato</em>. Se vuoi, l'app ti propone subito di creare il passo successivo (es. <em>"revisiona il testo"</em>) già assegnato a un collega.</p>
    <p style="margin:0"><strong>Allegare un file:</strong> sotto il task premi <em>+ Allega file</em> (se la funzione è attiva). Il file lo vedono e scaricano solo le persone dell'elenco.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Gli stati di un task (i colori a sinistra)</h3>
    <p style="margin:0"><span class="pill todo">Da fare</span> non l'ha ancora toccato nessuno &nbsp;·&nbsp; <span class="pill in_progress">In corso</span> ci si sta lavorando &nbsp;·&nbsp; <span class="pill done">Completato</span> è fatto.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Il Bloc Notes e gli Strumenti</h3>
    <p style="margin:0"><strong>Bloc Notes</strong> = un muro di appunti visibile a tutto il gruppo. Scrivi un pensiero, un promemoria, un'idea. Puoi modificare o cancellare i tuoi.</p>
    <p style="margin:0"><strong>Strumenti</strong> = la rubrica dei link ai programmi/servizi che usiamo, così nessuno deve più cercarli nelle mail.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Chi vede cosa? (la parte importante)</h3>
    <p style="margin:0">Un elenco lo vedono <strong>solo</strong> le persone che ci hai messo dentro. Se un collega non è tra i partecipanti o spettatori, quell'elenco per lui <strong>non esiste</strong>. Il Bloc Notes e gli Strumenti, invece, sono di tutti.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Bottoni in alto</h3>
    <p style="margin:0">🔔 le tue notifiche &nbsp;·&nbsp; 🌙/☀️ tema scuro o chiaro &nbsp;·&nbsp; IT/EN lingua &nbsp;·&nbsp; ⎋ esci. Se sei l'amministratore vedi anche <strong>+👤</strong> per creare nuovi account e <strong>🗂️</strong> per gestire tutti gli allegati (scaricarli o eliminarli).</p>
    <p class="muted small" style="margin:0">Suggerimento: mentre scrivi un task, premi <strong>Invio</strong> per confermare al volo.</p>
  </div>

  en:`
  <div class="card stack">
    <h2 style="margin:0">🧭 Simple guide</h2>
    <p class="muted" style="margin:0">Everything you need, in plain words. Don't worry: you can't break anything here.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">What is this place?</h3>
    <p style="margin:0">Think of it as the group's <strong>shared whiteboard</strong>. Here we track <strong>who does what</strong>, leave each other <strong>notes</strong>, and keep the <strong>links to our tools</strong> tidy. Everyone only sees what concerns them.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Three words to know</h3>
    <p style="margin:0"><strong>List</strong> = a folder for a project (e.g. <em>"Paper XYZ"</em>). It holds that project's tasks.</p>
    <p style="margin:0"><strong>Task</strong> = one thing to do (e.g. <em>"write the intro"</em>). It has an owner and a status.</p>
    <p style="margin:0"><strong>List people</strong> = <strong>Participants</strong> (do the work) and <strong>Watchers</strong> (only look, don't touch).</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">How do I…</h3>
    <p style="margin:0"><strong>Create a work folder:</strong> go to <em>Lists &amp; Tasks</em> → <em>+ New list</em>, name it, confirm.</p>
    <p style="margin:0"><strong>Invite colleagues:</strong> open the list → <em>Manage people</em> → pick the person and press <em>Add participant</em> (or <em>Add watcher</em>).</p>
    <p style="margin:0"><strong>Assign a task:</strong> open the list → <em>+ New task</em>, write what's needed and choose who to assign it to. That person gets a notification (🔔 top bar) and an email.</p>
    <p style="margin:0"><strong>Say "it's done":</strong> press <em>Mark done</em> on the task. If you like, the app offers to create the next step (e.g. <em>"review the text"</em>) already assigned to a colleague.</p>
    <p style="margin:0"><strong>Attach a file:</strong> under the task press <em>+ Attach file</em> (if enabled). Only the list's people can see and download it.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Task statuses (the coloured bar on the left)</h3>
    <p style="margin:0"><span class="pill todo">To do</span> nobody started yet &nbsp;·&nbsp; <span class="pill in_progress">In progress</span> being worked on &nbsp;·&nbsp; <span class="pill done">Done</span> finished.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Notepad and Tools</h3>
    <p style="margin:0"><strong>Notepad</strong> = a wall of notes visible to the whole group. Jot a thought, a reminder, an idea. You can edit or delete your own.</p>
    <p style="margin:0"><strong>Tools</strong> = the address book of links to the apps/services we use, so nobody digs through emails anymore.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Who sees what? (the important bit)</h3>
    <p style="margin:0"><strong>Only</strong> the people you add to a list can see it. If a colleague isn't a participant or watcher, that list simply <strong>doesn't exist</strong> for them. The Notepad and Tools, instead, are shared by everyone.</p>
  </div>

  <div class="card stack">
    <h3 style="margin:0">Top-bar buttons</h3>
    <p style="margin:0">🔔 your notifications &nbsp;·&nbsp; 🌙/☀️ dark or light theme &nbsp;·&nbsp; IT/EN language &nbsp;·&nbsp; ⎋ sign out. If you're the admin you also see <strong>+👤</strong> to create new accounts and <strong>🗂️</strong> to manage all attachments (download or delete them).</p>
    <p class="muted small" style="margin:0">Tip: while writing a task, press <strong>Enter</strong> to confirm quickly.</p>
  </div>
  `
};

// ============================================================================
//  State & Supabase client
// ============================================================================
let sb = null;
const state = { user:null, profile:null, profiles:{}, lists:[], currentListId:null,
  tasks:[], members:[], notes:[], tools:[], notifications:[], attachments:{}, tab:"lists" };

const $ = s => document.querySelector(s);
const el = (tag, props={}, html) => { const e=document.createElement(tag); Object.assign(e,props); if(html!=null)e.innerHTML=html; return e; };
const esc = s => (s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const initials = s => (s||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
const nameOf = id => { const p=state.profiles[id]; return p ? (p.full_name || p.username || p.email) : "?"; };
function fmt(ts){ if(!ts) return "—"; const d=new Date(ts);
  return d.toLocaleString(LANG==="it"?"it-IT":"en-GB",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}); }
function toast(msg){ const h=$("#toastHost"); const d=el("div",{className:"toast"},esc(msg)); h.appendChild(d); setTimeout(()=>d.remove(),2600); }

// ============================================================================
//  Theme
// ============================================================================
function applyTheme(t){ document.documentElement.setAttribute("data-theme",t); localStorage.setItem("ews_theme",t);
  const icon = t==="dark"?"☀️":"🌙"; $("#btnTheme").textContent=icon; $("#authTheme").textContent=icon; }
function toggleTheme(){ applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"); }

function renderStatic(){

async function doLogin(){
  $("#authError").classList.add("hidden");
  const email=$("#email").value.trim(), password=$("#password").value;
  if(!email||!password) return;
  $("#btnLogin").textContent=t("loggingIn"); $("#btnLogin").disabled=true;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  $("#btnLogin").disabled=false; $("#btnLogin").textContent=t("login");
  if(error){ $("#authError").textContent=error.message; $("#authError").classList.remove("hidden"); return; }
  await onSignedIn();
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }

async function onSignedIn(){
  const { data:{ user } } = await sb.auth.getUser();
  state.user = user;
  // profilo dell'utente corrente
  let { data:prof } = await sb.from("profiles").select("*").eq("id",user.id).single();
  state.profile = prof;
  $("#authView").classList.add("hidden");
  $("#topbar").classList.remove("hidden");
  $("#appView").classList.remove("hidden");
  $("#btnNewUser").classList.toggle("hidden", state.profile?.role!=="admin");
  $("#btnAttAdmin").classList.toggle("hidden", state.profile?.role!=="admin");
  await loadProfiles();
  await loadLists();
  await loadNotes();
  await loadTools();
  await loadNotifications();
  switchTab("lists");
}

async function loadProfiles(){
  const { data } = await sb.from("profiles").select("*");
  state.profiles = {}; (data||[]).forEach(p=>state.profiles[p.id]=p);
}

// ============================================================================
//  Lists & members
// ============================================================================
async function loadLists(){
  const { data } = await sb.from("task_lists").select("*").eq("archived",false)
    .order("position",{ascending:true}).order("updated_at",{ascending:false});
  state.lists = data||[];
  if(state.currentListId && !state.lists.find(l=>l.id===state.currentListId)) state.currentListId=null;
  renderLists();
  if(state.currentListId) await selectList(state.currentListId, true);
  else renderListDetail();
}

function renderLists(){
  const c=$("#listsContainer"); if(!c) return; c.innerHTML="";
  if(!state.lists.length){ c.appendChild(el("p",{className:"muted small"},esc(t("noLists")))); return; }
  state.lists.forEach((l,idx)=>{
    const card=el("div",{className:"card listitem"+(l.id===state.currentListId?" active":"")});
    const rowWrap=el("div",{className:"row",style:"width:100%;gap:.4rem;align-items:center"});
    const main=el("div",{className:"grow",style:"cursor:pointer;min-width:0"});
    main.innerHTML=`<strong>${esc(l.title)}</strong>${l.description?`<br><span class="small muted">${esc(l.description)}</span>`:""}`;
    main.onclick=()=>selectList(l.id);
    const arrows=el("div",{className:"stack",style:"gap:.1rem;flex:none"});
    const up=el("button",{className:"tiny ghost",title:t("moveUp")},"▲"); up.disabled=idx===0; up.onclick=()=>moveList(l,-1);
    const dn=el("button",{className:"tiny ghost",title:t("moveDown")},"▼"); dn.disabled=idx===state.lists.length-1; dn.onclick=()=>moveList(l,1);
    arrows.appendChild(up); arrows.appendChild(dn);
    rowWrap.appendChild(main); rowWrap.appendChild(arrows);
    card.appendChild(rowWrap);
    c.appendChild(card);
  });
}
async function moveList(list, dir){
  const ordered=state.lists;
  const i=ordered.findIndex(l=>l.id===list.id); const j=dir<0?i-1:i+1;
  if(j<0||j>=ordered.length) return;
  const a=ordered[i], b=ordered[j];
  const pa=a.position??0, pb=b.position??0;
  if(pa===pb){
    await Promise.all(ordered.map((l,idx)=> sb.from("task_lists").update({position:idx}).eq("id",l.id)));
    await Promise.all([ sb.from("task_lists").update({position:j}).eq("id",a.id),
                       sb.from("task_lists").update({position:i}).eq("id",b.id) ]);
  } else {
    await Promise.all([ sb.from("task_lists").update({position:pb}).eq("id",a.id),
                       sb.from("task_lists").update({position:pa}).eq("id",b.id) ]);
  }
  await loadLists();
}

async function selectList(id, keep){
  state.currentListId=id;
  const [{data:members},{data:tasks},{data:atts}] = await Promise.all([
    sb.from("list_members").select("*").eq("list_id",id),
    sb.from("tasks").select("*").eq("list_id",id).order("created_at",{ascending:true}),
    sb.from("attachments").select("*").eq("list_id",id).order("created_at",{ascending:true})
  ]);
  state.members=members||[]; state.tasks=tasks||[];
  state.attachments={}; (atts||[]).forEach(a=>{ (state.attachments[a.task_id]=state.attachments[a.task_id]||[]).push(a); });
  renderLists(); renderListDetail();
}

function myRoleInCurrent(){
  const m=state.members.find(m=>m.user_id===state.user.id);
  if(state.profile?.role==="admin") return "participant";
  return m ? m.role : null;
}

function renderListDetail(){
  const d=$("#listDetail"); if(!d) return; d.innerHTML="";
  const list=state.lists.find(l=>l.id===state.currentListId);
  if(!list){ d.appendChild(el("div",{className:"card muted"},esc(t("selectList")))); return; }
  const canEdit = myRoleInCurrent()==="participant";

  // header card
  const head=el("div",{className:"card stack"});
  const parts=state.members.filter(m=>m.role==="participant").map(m=>chip(m.user_id)).join(" ");
  const watch=state.members.filter(m=>m.role==="watcher").map(m=>chip(m.user_id)).join(" ");
  head.innerHTML=`
    <div class="row wrap" style="justify-content:space-between">
      <div><h2 style="margin:0 0 .1rem">${esc(list.title)}</h2>
        ${list.description?`<div class="muted small">${esc(list.description)}</div>`:""}</div>
    </div>
    <div class="small"><strong>${t("participants")}:</strong> ${parts||`<span class="muted">—</span>`}</div>
    <div class="small"><strong>${t("watchers")}:</strong> ${watch||`<span class="muted">—</span>`}</div>
    <div class="row wrap">
      ${canEdit?`<button class="tiny" id="dBtnMembers">${t("manageMembers")}</button>`:""}
      ${canEdit?`<button class="tiny primary" id="dBtnAddTask">${t("addTask")}</button>`:""}
      ${canEdit?`<button class="tiny" id="dBtnRename">${t("editList")}</button>`:""}
      ${canEdit?`<button class="tiny" id="dBtnArchive">${t("archive")}</button>`:""}
      ${(list.created_by===state.user.id||state.profile?.role==="admin")?`<button class="tiny" id="dBtnDelList" style="color:var(--danger)">${t("deleteList")}</button>`:""}
    </div>`;
  d.appendChild(head);
  if(canEdit){
    head.querySelector("#dBtnMembers").onclick=openMembersModal;
    head.querySelector("#dBtnAddTask").onclick=()=>openTaskModal();
    head.querySelector("#dBtnRename").onclick=()=>openListModal(list);
    head.querySelector("#dBtnArchive").onclick=()=>archiveList(list);
    const delB=head.querySelector("#dBtnDelList"); if(delB) delB.onclick=()=>deleteList(list);
  }

  // tasks
  const tc=el("div",{className:"stack"});
  if(!state.tasks.length){ tc.appendChild(el("div",{className:"card muted small"},esc(t("noTasks")))); }
  state.tasks.forEach(tk=>tc.appendChild(renderTask(tk,canEdit)));
  d.appendChild(tc);
}

function chip(uid){
  const me = uid===state.user.id;
  return `<span class="pill"><span class="avatar" style="width:16px;height:16px;font-size:.6rem;vertical-align:middle">${esc(initials(nameOf(uid)))}</span> ${esc(nameOf(uid))}${me?" ("+t("you")+")":""}</span>`;
}

function renderTask(tk, canEdit){
  const wrap=el("div",{className:"task s-"+tk.status});
  const statusLabel = tk.status==="todo"?t("statusTodo"):tk.status==="in_progress"?t("statusProgress"):t("statusDone");
  wrap.innerHTML=`
    <div class="row wrap" style="justify-content:space-between">
      <h4>${esc(tk.title)}</h4>
      <span class="pill ${tk.status}">${statusLabel}</span>
    </div>
    ${tk.description?`<div class="small" style="margin:.2rem 0 .4rem">${esc(tk.description)}</div>`:""}
    <div class="small muted">
      <span class="avatar">${esc(initials(nameOf(tk.assigned_to)))}</span>
      ${t("assignedTo")}: <strong>${tk.assigned_to?esc(nameOf(tk.assigned_to)):t("unassigned")}</strong>
      &nbsp;·&nbsp; ${t("createdBy")}: ${esc(nameOf(tk.created_by))}
      ${tk.due_date?`&nbsp;·&nbsp; ${t("due")}: ${esc(tk.due_date)}`:""}
    </div>
    <div class="small muted">${t("created")}: ${fmt(tk.created_at)} &nbsp;·&nbsp; ${t("updated")}: ${fmt(tk.updated_at)}</div>
    <div class="row wrap" style="margin-top:.5rem"></div>`;
  if(canEdit){
    const bar=wrap.querySelector(".row:last-child");
    if(tk.status!=="in_progress" && tk.status!=="done")
      bar.appendChild(mkBtn(t("start"),"tiny",()=>setStatus(tk,"in_progress")));
    if(tk.status!=="done")
      bar.appendChild(mkBtn(t("markDone"),"tiny primary",()=>completeTask(tk)));
    else
      bar.appendChild(mkBtn(t("reopen"),"tiny",()=>setStatus(tk,"todo")));
    bar.appendChild(mkBtn(t("edit"),"tiny",()=>openTaskModal(tk)));
    bar.appendChild(mkBtn(t("del"),"tiny",()=>deleteTask(tk)));
  }
  // allegati
  const atts=state.attachments[tk.id]||[];
  if(atts.length || canEdit){
    const ab=el("div",{className:"stack"}); ab.style.cssText="margin-top:.55rem;gap:.3rem;border-top:1px dashed var(--border);padding-top:.5rem";
    if(atts.length) ab.appendChild(el("div",{className:"small muted"},"📎 "+t("attachments")));
    atts.forEach(a=>{
      const row=el("div",{className:"row small",style:"gap:.4rem;justify-content:space-between"});
      const link=el("a",{href:"#"}); link.innerHTML=`📄 ${esc(a.filename)} <span class="muted">(${fmtSize(a.size)})</span>`;
      link.onclick=e=>{ e.preventDefault(); downloadAttachment(a); };
      row.appendChild(link);
      if(state.profile?.role==="admin"){ const d=el("button",{className:"tiny ghost",title:t("del")},"✕"); d.onclick=()=>deleteAttachment(a); row.appendChild(d); }
      ab.appendChild(row);
    });
    if(canEdit){
      const up=el("label",{className:"tiny",style:"display:inline-flex;align-items:center;gap:.3rem;cursor:pointer;border:1px solid var(--border);border-radius:8px;padding:.28rem .55rem;width:max-content"});
      up.append(t("addFile"));
      const inp=el("input",{type:"file"}); inp.style.display="none";
      inp.onchange=()=>{ if(inp.files[0]) uploadAttachment(tk, inp.files[0]); };
      up.appendChild(inp); ab.appendChild(up);
    }
    wrap.appendChild(ab);
  }
  return wrap;
}
function fmtSize(b){ if(b==null) return "?"; if(b<1024) return b+" B";
  if(b<1048576) return (b/1024).toFixed(0)+" KB"; return (b/1048576).toFixed(1)+" MB"; }
async function uploadAttachment(tk, file){
  if(file.size > 25*1024*1024){ toast(t("fileTooBig")); return; }
  toast(t("uploading"));
  const safe=file.name.replace(/[^\w.\-]+/g,"_");
  const path=`${tk.list_id}/${tk.id}/${crypto.randomUUID()}_${safe}`;
  const { error:upErr }=await sb.storage.from("attachments").upload(path, file, { contentType:file.type||undefined });
  if(upErr){ toast(upErr.message); return; }
  const { error:insErr }=await sb.from("attachments").insert({ task_id:tk.id, list_id:tk.list_id,
    path, filename:file.name, size:file.size, mime:file.type||null, uploaded_by:state.user.id });
  if(insErr){ toast(insErr.message); return; }
  await selectList(state.currentListId,true);
}
async function downloadAttachment(a){
  const { data, error }=await sb.storage.from("attachments").createSignedUrl(a.path, 60);
  if(error){ toast(error.message); return; }
  window.open(data.signedUrl, "_blank");
}
async function deleteAttachment(a){
  if(!confirm(t("confirmDelFile"))) return;
  await sb.storage.from("attachments").remove([a.path]);
  const { error }=await sb.from("attachments").delete().eq("id",a.id);
  if(error){ toast(error.message); return; }
  if(state.currentListId) await selectList(state.currentListId,true);
}
const mkBtn=(label,cls,fn)=>{ const b=el("button",{className:cls},esc(label)); b.onclick=fn; return b; };

async function setStatus(tk,status){
  const { error } = await sb.from("tasks").update({ status }).eq("id",tk.id);
  if(error) return toast(error.message);
  await selectList(state.currentListId,true);
}
async function completeTask(tk){
  const { error } = await sb.from("tasks").update({ status:"done" }).eq("id",tk.id);
  if(error) return toast(error.message);
  await selectList(state.currentListId,true);
  // proponi task collegato
  openTaskModal(null, { linked:true, base:tk });
}
async function deleteTask(tk){
  if(!confirm(t("confirmDelTask"))) return;
  const { error } = await sb.from("tasks").delete().eq("id",tk.id);
  if(error) return toast(error.message);
  await selectList(state.currentListId,true);
}

async function deleteList(list){
  if(!confirm(t("confirmDelList"))) return;
  const { error } = await sb.from("task_lists").delete().eq("id",list.id);
  if(error) return toast(error.message);
  state.currentListId=null; await loadLists();
}
async function archiveList(list){
  if(!confirm(t("confirmArchive"))) return;
  const { error } = await sb.from("task_lists").update({archived:true}).eq("id",list.id);
  if(error) return toast(error.message);
  state.currentListId=null; await loadLists();
}
async function unarchiveList(l){
  const { error } = await sb.from("task_lists").update({archived:false}).eq("id",l.id);
  if(error) return toast(error.message);
  await loadArchived(); await loadLists();
}
async function loadArchived(){
  const c=$("#panel-archived"); if(!c) return;
  const { data:lists } = await sb.from("task_lists").select("*").eq("archived",true).order("updated_at",{ascending:false});
  const arch=lists||[]; c.innerHTML="";
  if(!arch.length){ c.appendChild(el("div",{className:"card muted small"},esc(t("archivedEmpty")))); return; }
  for(const l of arch){
    const card=el("div",{className:"card stack"});
    card.innerHTML=`<div class="row wrap" style="justify-content:space-between">
        <div><h3 style="margin:0">${esc(l.title)}</h3>${l.description?`<div class="muted small">${esc(l.description)}</div>`:""}</div>
      </div>`;
    const { data:tasks } = await sb.from("tasks").select("*").eq("list_id",l.id).order("created_at",{ascending:true});
    const tl=el("div",{className:"stack",style:"gap:.3rem"});
    (tasks||[]).forEach(tk=>{
      const sl = tk.status==="todo"?t("statusTodo"):tk.status==="in_progress"?t("statusProgress"):t("statusDone");
      const r=el("div",{className:"row small",style:"gap:.4rem;justify-content:space-between"});
      r.innerHTML=`<span>${esc(tk.title)}${tk.assigned_to?` <span class="muted">· ${esc(nameOf(tk.assigned_to))}</span>`:""}</span><span class="pill ${tk.status}">${sl}</span>`;
      tl.appendChild(r);
    });
    if(!(tasks||[]).length) tl.appendChild(el("div",{className:"muted small"},esc(t("noTasks"))));
    card.appendChild(tl);
    const bar=el("div",{className:"row"}); bar.appendChild(mkBtn(t("unarchive"),"tiny primary",()=>unarchiveList(l)));
    card.appendChild(bar);
    c.appendChild(card);
  }
}

function openModal(innerHtml){
  const host=$("#modalHost");
  host.innerHTML=`<div class="modal-bg"><div class="card modal stack">${innerHtml}</div></div>`;
  host.querySelector(".modal-bg").addEventListener("click",e=>{ if(e.target.classList.contains("modal-bg")) closeModal(); });
  const modal=host.querySelector(".modal");
  // Invio in un campo di testo = conferma; Esc = chiudi
  modal.addEventListener("keydown",e=>{
    if(e.key==="Enter" && e.target.tagName==="INPUT"){ e.preventDefault(); const b=modal.querySelector("button.primary"); if(b) b.click(); }
    else if(e.key==="Escape"){ closeModal(); }
  });
  // focus sul primo campo
  setTimeout(()=>{ const f=modal.querySelector("input,textarea"); if(f) f.focus(); },30);
  return modal;
}
function closeModal(){ $("#modalHost").innerHTML=""; }

function openListModal(existing){
  const m=openModal(`
    <h3 style="margin:0">${existing?t("editList"):t("mNewListTitle")}</h3>
    <div><label class="field">${t("mListTitle")}</label><input id="mLTitle" value="${existing?esc(existing.title):""}"></div>
    <div><label class="field">${t("mListDesc")}</label><textarea id="mLDesc">${existing?esc(existing.description||""):""}</textarea></div>
    <div class="row" style="justify-content:flex-end">
      <button class="ghost" id="mCancel">${t("mCancel")}</button>
      <button class="primary" id="mOk">${existing?t("mSave"):t("mCreate")}</button>
    </div>`);
  m.querySelector("#mCancel").onclick=closeModal;
  m.querySelector("#mOk").onclick=async()=>{
    const title=m.querySelector("#mLTitle").value.trim(); if(!title) return;
    const desc=m.querySelector("#mLDesc").value.trim();
    if(existing){
      const { error }=await sb.from("task_lists").update({title,description:desc}).eq("id",existing.id);
      if(error) return toast(error.message);
      closeModal(); await loadLists(); await selectList(existing.id,true);
    } else {
      const { data, error }=await sb.from("task_lists").insert({title,description:desc,created_by:state.user.id}).select().single();
      if(error) return toast(error.message);
      // il creatore diventa automaticamente partecipante (via trigger DB)
      closeModal(); await loadLists(); await selectList(data.id);
    }
  };
}

function openTaskModal(existing, opts={}){
  const list=state.lists.find(l=>l.id===state.currentListId);
  const memberIds=[...new Set(state.members.map(m=>m.user_id))];
  const options=memberIds.map(id=>`<option value="${id}">${esc(nameOf(id))}${id===state.user.id?" ("+t("you")+")":""}</option>`).join("");
  const base=opts.base;
  const preTitle = existing?existing.title : (opts.linked&&base?`Revisionare / step successivo: ${base.title}`:"");
  const preAssignee = existing?existing.assigned_to : (opts.linked&&base?base.created_by:"");
  const m=openModal(`
    <h3 style="margin:0">${existing?t("edit"):(opts.linked?t("createLinked"):t("mNewTaskTitle"))}</h3>
    ${opts.linked?`<div class="small muted">${t("linkedPrompt")}</div>`:""}
    <div><label class="field">${t("mTaskTitle")}</label><input id="mTTitle" value="${esc(preTitle)}"></div>
    <div><label class="field">${t("mTaskDesc")}</label><textarea id="mTDesc">${existing?esc(existing.description||""):""}</textarea></div>
    <div><label class="field">${t("assignedTo")}</label>
      <select id="mTAssignee"><option value="">${t("unassigned")}</option>${options}</select></div>
    <div><label class="field">${t("mDue")}</label><input id="mTDue" type="date" value="${existing&&existing.due_date?existing.due_date:""}"></div>
    <div class="row" style="justify-content:flex-end">
      <button class="ghost" id="mCancel">${t("mCancel")}</button>
      <button class="primary" id="mOk">${existing?t("mSave"):t("mCreate")}</button>
    </div>`);
  const sel=m.querySelector("#mTAssignee"); if(preAssignee) sel.value=preAssignee;
  m.querySelector("#mCancel").onclick=closeModal;
  m.querySelector("#mOk").onclick=async()=>{
    const title=m.querySelector("#mTTitle").value.trim(); if(!title) return;
    const payload={ title, description:m.querySelector("#mTDesc").value.trim(),
      assigned_to:sel.value||null, due_date:m.querySelector("#mTDue").value||null };
    if(existing){
      const { error }=await sb.from("tasks").update(payload).eq("id",existing.id);
      if(error) return toast(error.message);
    } else {
      payload.list_id=state.currentListId; payload.created_by=state.user.id; payload.status="todo";
      const { error }=await sb.from("tasks").insert(payload);
      if(error) return toast(error.message);
    }
    closeModal(); await selectList(state.currentListId,true);
  };
}

function openMembersModal(){
  const list=state.lists.find(l=>l.id===state.currentListId);
  const memberRows=state.members.map(mm=>`
    <div class="row" style="justify-content:space-between">
      <span>${chip(mm.user_id)} <span class="pill">${mm.role==="participant"?t("participants"):t("watchers")}</span></span>
      <button class="tiny" data-rm="${mm.user_id}" style="color:var(--danger)">${t("mRemove")}</button>
    </div>`).join("");
  const avail=Object.values(state.profiles).filter(p=>!state.members.find(mm=>mm.user_id===p.id));
  const opts=avail.map(p=>`<option value="${p.id}">${esc(p.full_name||p.username||p.email)}</option>`).join("");
  const m=openModal(`
    <h3 style="margin:0">${t("mMembersTitle")}</h3>
    <div class="stack">${memberRows||`<span class="muted small">—</span>`}</div>
    <hr style="border:none;border-top:1px solid var(--border);width:100%">
    <div><label class="field">${t("mChoosePerson")}</label>
      <select id="mPerson"><option value="">${t("mChoosePerson")}</option>${opts}</select></div>
    <div class="row wrap">
      <button class="tiny primary" id="mAddP">${t("mAddParticipant")}</button>
      <button class="tiny" id="mAddW">${t("mAddWatcher")}</button>
      <div class="grow"></div>
      <button class="ghost" id="mClose">${t("mCancel")}</button>
    </div>`);
  m.querySelectorAll("[data-rm]").forEach(b=>b.onclick=async()=>{
    await sb.from("list_members").delete().eq("list_id",list.id).eq("user_id",b.dataset.rm);
    await selectList(list.id,true); openMembersModal();
  });
  const add=async(role)=>{
    const uid=m.querySelector("#mPerson").value; if(!uid) return;
    const { error }=await sb.from("list_members").insert({list_id:list.id,user_id:uid,role});
    if(error) return toast(error.message);
    await selectList(list.id,true); openMembersModal();
  };
  m.querySelector("#mAddP").onclick=()=>add("participant");
  m.querySelector("#mAddW").onclick=()=>add("watcher");
  m.querySelector("#mClose").onclick=closeModal;
}

// ============================================================================
//  Creazione account (solo admin)
// ============================================================================
let sbSignup = null;   // client separato: non tocca la sessione dell'admin
function openNewUserModal(){
  if(state.profile?.role!=="admin") return;
  const m=openModal(`
    <h3 style="margin:0">${t("mNewAccountTitle")}</h3>
    <p class="small muted" style="margin:0">${t("accountHint")}</p>
    <div><label class="field">${t("mFullNameLbl")}</label><input id="uFull"></div>
    <div><label class="field">${t("mUsernameLbl")}</label><input id="uUser"></div>
    <div><label class="field">${t("mEmailLbl")}</label><input id="uEmail" type="email"></div>
    <div><label class="field">${t("mPasswordLbl")}</label><input id="uPass" type="text"></div>
    <p class="small hidden" id="uErr" style="color:var(--danger)"></p>
    <div class="row" style="justify-content:flex-end">
      <button class="ghost" id="mCancel">${t("mCancel")}</button>
      <button class="primary" id="mOk">${t("mCreateAccount")}</button>
    </div>`);
  m.querySelector("#mCancel").onclick=closeModal;
  m.querySelector("#mOk").onclick=async()=>{
    const full_name=m.querySelector("#uFull").value.trim();
    const username=m.querySelector("#uUser").value.trim();
    const email=m.querySelector("#uEmail").value.trim();
    const password=m.querySelector("#uPass").value;
    const err=m.querySelector("#uErr");
    if(!email||password.length<6){ err.textContent="Email valida e password (min. 6) richieste."; err.classList.remove("hidden"); return; }
    if(!sbSignup) sbSignup=window.supabase.createClient(
      window.EWS_CONFIG.SUPABASE_URL, window.EWS_CONFIG.SUPABASE_ANON_KEY,
      { auth:{ persistSession:false, autoRefreshToken:false } });
    const { error }=await sbSignup.auth.signUp({ email, password,
      options:{ data:{ full_name, username, role:"member" } } });
    if(error){ err.textContent=error.message; err.classList.remove("hidden"); return; }
    closeModal(); toast(t("accountCreated")+": "+(username||email));
    setTimeout(loadProfiles, 1200);   // il profilo lo crea il trigger DB
  };
}

// ============================================================================
//  Pannello di controllo di TUTTI gli allegati (solo admin)
// ============================================================================
async function openAttachmentsAdminModal(){
  if(state.profile?.role!=="admin") return;
  const m=openModal(`
    <div class="row" style="justify-content:space-between"><h3 style="margin:0">${t("attAdminTitle")}</h3></div>
    <div class="stack" id="attAdminList"><span class="muted small">…</span></div>
    <div class="row" style="justify-content:flex-end"><button class="ghost" id="mClose">${t("mCancel")}</button></div>`);
  m.querySelector("#mClose").onclick=closeModal;
  const [{ data:atts },{ data:allLists }] = await Promise.all([
    sb.from("attachments").select("*").order("created_at",{ascending:false}),
    sb.from("task_lists").select("id,title")
  ]);
  const listMap={}; (allLists||[]).forEach(l=>listMap[l.id]=l.title);
  const cont=m.querySelector("#attAdminList"); cont.innerHTML="";
  if(!atts||!atts.length){ cont.appendChild(el("div",{className:"muted small"},esc(t("attEmpty")))); return; }
  atts.forEach(a=>{
    const row=el("div",{className:"card",style:"padding:.55rem"});
    row.innerHTML=`<div class="row" style="justify-content:space-between;gap:.5rem">
        <div style="min-width:0"><div><strong>${esc(a.filename)}</strong> <span class="muted small">(${fmtSize(a.size)})</span></div>
          <div class="muted small">${t("inList")}: ${esc(listMap[a.list_id]||"—")} · ${t("by")} ${esc(nameOf(a.uploaded_by))} · ${fmt(a.created_at)}</div></div>
        <div class="row bar" style="gap:.3rem;flex:none"></div>
      </div>`;
    const bar=row.querySelector(".bar");
    bar.appendChild(mkBtn(t("download"),"tiny",()=>downloadAttachment(a)));
    bar.appendChild(mkBtn(t("del"),"tiny",async()=>{ await deleteAttachment(a); openAttachmentsAdminModal(); }));
    cont.appendChild(row);
  });
}

// ============================================================================
//  Notes
// ============================================================================
async function loadNotes(){
  const { data }=await sb.from("notes").select("*").order("updated_at",{ascending:false});
  state.notes=data||[]; renderNotes();
}
function renderNotes(){
  const c=$("#notesContainer"); if(!c) return; c.innerHTML="";
  if(!state.notes.length){ c.appendChild(el("div",{className:"card muted small"},esc(t("notesEmpty")))); return; }
  state.notes.forEach(n=>{
    const mine=n.created_by===state.user.id||state.profile?.role==="admin";
    const card=el("div",{className:"card stack"});
    card.innerHTML=`
      ${n.title?`<strong>${esc(n.title)}</strong>`:""}
      <div style="white-space:pre-wrap">${esc(n.content)}</div>
      <div class="small muted">${esc(nameOf(n.created_by))} · ${fmt(n.updated_at)}</div>`;
    if(mine){
      const bar=el("div",{className:"row"});
      bar.appendChild(mkBtn(t("edit"),"tiny",()=>editNote(n)));
      bar.appendChild(mkBtn(t("del"),"tiny",()=>deleteNote(n)));
      card.appendChild(bar);
    }
    c.appendChild(card);
  });
}
async function addNote(){
  const title=$("#noteTitle").value.trim(), content=$("#noteContent").value.trim();
  if(!content) return;
  const { error }=await sb.from("notes").insert({title,content,created_by:state.user.id});
  if(error) return toast(error.message);
  $("#noteTitle").value=""; $("#noteContent").value=""; await loadNotes();
}
function editNote(n){
  const m=openModal(`
    <h3 style="margin:0">${t("edit")}</h3>
    <div><label class="field">${t("noteTitlePh")}</label><input id="eNTitle" value="${esc(n.title||"")}"></div>
    <div><label class="field">${t("noteContentPh")}</label><textarea id="eNContent">${esc(n.content)}</textarea></div>
    <div class="row" style="justify-content:flex-end">
      <button class="ghost" id="mCancel">${t("mCancel")}</button>
      <button class="primary" id="mOk">${t("mSave")}</button></div>`);
  m.querySelector("#mCancel").onclick=closeModal;
  m.querySelector("#mOk").onclick=async()=>{
    const { error }=await sb.from("notes").update({title:m.querySelector("#eNTitle").value.trim(),content:m.querySelector("#eNContent").value.trim()}).eq("id",n.id);
    if(error) return toast(error.message); closeModal(); await loadNotes();
  };
}
async function deleteNote(n){ if(!confirm(t("confirmDelNote")))return;
  await sb.from("notes").delete().eq("id",n.id); await loadNotes(); }

// ============================================================================
//  Tools
// ============================================================================
async function loadTools(){
  const { data }=await sb.from("tools").select("*").order("created_at",{ascending:false});
  state.tools=data||[]; renderTools();
}
function renderTools(){
  const c=$("#toolsContainer"); if(!c) return; c.innerHTML="";
  if(!state.tools.length){ c.appendChild(el("div",{className:"card muted small"},esc(t("toolsEmpty")))); return; }
  state.tools.forEach(tl=>{
    const mine=tl.created_by===state.user.id||state.profile?.role==="admin";
    const url = /^https?:\/\//i.test(tl.url)?tl.url:"https://"+tl.url;
    const card=el("div",{className:"card stack"});
    card.innerHTML=`
      <div class="row wrap" style="justify-content:space-between">
        <a href="${esc(url)}" target="_blank" rel="noopener"><strong>${esc(tl.name)}</strong> ↗</a>
      </div>
      ${tl.description?`<div class="small">${esc(tl.description)}</div>`:""}
      <div class="small muted">${esc(url)} · ${esc(nameOf(tl.created_by))}</div>`;
    if(mine){ const bar=el("div",{className:"row"}); bar.appendChild(mkBtn(t("del"),"tiny",()=>deleteTool(tl))); card.appendChild(bar); }
    c.appendChild(card);
  });
}
async function addTool(){
  const name=$("#toolName").value.trim(), url=$("#toolUrl").value.trim(), description=$("#toolDesc").value.trim();
  if(!name||!url) return;
  const { error }=await sb.from("tools").insert({name,url,description,created_by:state.user.id});
  if(error) return toast(error.message);
  $("#toolName").value=""; $("#toolUrl").value=""; $("#toolDesc").value=""; await loadTools();
}
async function deleteTool(tl){ if(!confirm(t("confirmDelTool")))return;
  await sb.from("tools").delete().eq("id",tl.id); await loadTools(); }

// ============================================================================
//  Notifications
// ============================================================================
async function loadNotifications(){
  const { data }=await sb.from("notifications").select("*").eq("user_id",state.user.id).order("created_at",{ascending:false}).limit(50);
  state.notifications=data||[]; updateNotifBadge();
}
function updateNotifBadge(){
  const n=state.notifications.filter(x=>!x.read).length;
  const b=$("#notifCount"); if(!b) return;
  if(n>0){ b.textContent=n; b.classList.remove("hidden"); } else b.classList.add("hidden");
}
function openNotifModal(){
  const rows=state.notifications.map(n=>`
    <div class="card" style="padding:.6rem;${n.read?"opacity:.6":""}">
      <div>${esc(n.message||"")}</div>
      <div class="small muted">${fmt(n.created_at)}</div>
    </div>`).join("");
  const m=openModal(`
    <div class="row" style="justify-content:space-between"><h3 style="margin:0">${t("notifTitle")}</h3></div>
    <div class="stack">${rows||`<span class="muted small">${t("notifEmpty")}</span>`}</div>
    <div class="row" style="justify-content:space-between">
      <button class="tiny" id="mMarkAll">${t("markAllRead")}</button>
      <button class="ghost" id="mClose">${t("mCancel")}</button>
    </div>`);
  m.querySelector("#mClose").onclick=closeModal;
  m.querySelector("#mMarkAll").onclick=async()=>{
    await sb.from("notifications").update({read:true}).eq("user_id",state.user.id).eq("read",false);
    await loadNotifications(); closeModal();
  };
  // apri le notifiche relative -> vai all'elenco
  state.notifications.forEach((n,i)=>{
    const card=m.querySelectorAll(".stack .card")[i];
    if(card && n.list_id) card.style.cursor="pointer", card.onclick=async()=>{
      await sb.from("notifications").update({read:true}).eq("id",n.id);
      closeModal(); switchTab("lists"); await loadNotifications();
      if(state.lists.find(l=>l.id===n.list_id)) await selectList(n.list_id);
    };
  });
}

// ============================================================================
//  Tabs
// ============================================================================
function switchTab(tab){
  state.tab=tab;
  ["lists","notes","tools","archived","guide"].forEach(x=>{
    $("#panel-"+x).classList.toggle("hidden",x!==tab);
    document.querySelector(`[data-tab="${x}"]`).classList.toggle("active",x===tab);
  });
  if(tab==="archived") loadArchived();
}

// ============================================================================
//  Boot
// ============================================================================
function wire(){
  $("#btnLogin").onclick=doLogin;
  $("#password").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
  $("#btnLogout").onclick=doLogout;
  $("#btnTheme").onclick=toggleTheme; $("#authTheme").onclick=toggleTheme;
  $("#btnLang").onclick=toggleLang; $("#authLang").onclick=toggleLang;
  $("#btnNotif").onclick=openNotifModal;
  $("#btnNewUser").onclick=openNewUserModal;
  $("#btnAttAdmin").onclick=openAttachmentsAdminModal;
  $("#btnNewList").onclick=()=>openListModal(null);
  $("#btnAddNote").onclick=addNote;
  $("#btnAddTool").onclick=addTool;
  document.querySelectorAll("nav.tabs button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
}

async function boot(){
  applyTheme(localStorage.getItem("ews_theme")||"light");
  wire(); applyLang(LANG); renderStatic();
  if(!window.EWS_CONFIG || !window.EWS_CONFIG.SUPABASE_URL || window.EWS_CONFIG.SUPABASE_URL.includes("XXXX")){
    $("#authError").textContent="Configura config.js con URL e anon key di Supabase (vedi SETUP.md).";
    $("#authError").classList.remove("hidden"); return;
  }
  sb = window.supabase.createClient(window.EWS_CONFIG.SUPABASE_URL, window.EWS_CONFIG.SUPABASE_ANON_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  if(session) await onSignedIn();
  // refresh periodico leggero di task/notifiche
  setInterval(async()=>{ if(state.user){ await loadNotifications();
    if(state.tab==="lists"&&state.currentListId) await selectList(state.currentListId,true); } },30000);
}
boot();
</script>
